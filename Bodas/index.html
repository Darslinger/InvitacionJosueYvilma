<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Novios - Generador</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: white; text-align: center; padding: 20px; }
        .panel { background: #2c3e50; padding: 30px; border-radius: 15px; max-width: 450px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #34495e; background: #1a252f; color: white; box-sizing: border-box; }
        button { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .resultado { margin-top: 30px; padding: 20px; background: #ecf0f1; color: #2c3e50; border-radius: 10px; display: none; }
        #linkFinal { background: #fff; color: #27ae60; border: 1px solid #bdc3c7; font-size: 14px; width: 100%; box-sizing: border-box; padding: 10px; }
        #btnWhatsapp { background: #25D366; margin-top: 15px; text-decoration: none; display: block; color: white; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Panel de Novios 👰🤵</h1>
    
    <div class="panel">
        <input type="text" id="nombreI" placeholder="Nombre (ej: Familia Reyes)">
        <input type="number" id="pasesI" placeholder="Número de pases">
        <button onclick="generarLink()">Generar Invitación ✨</button>

        <div id="resultado" class="resultado">
            <p>Link listo para enviar:</p>
            <input type="text" id="linkFinal" readonly>
            <a id="btnWhatsapp" target="_blank">Enviar por WhatsApp 📱</a>
        </div>
    </div>

    <script>
        function generarLink() {
            const nombre = document.getElementById('nombreI').value.trim();
            const pases = document.getElementById('pasesI').value.trim();
            
            if (nombre === "" || pases === "") {
                alert("Por favor, completa los campos.");
                return;
            }

            // --- SOLUCIÓN DEFINITIVA A LA RUTA ---
            // Esta línea asegura que el link siempre incluya la carpeta /Bodas/
            const urlBase = window.location.origin + window.location.pathname;
            const urlLimpia = urlBase.replace('index.html', '');
            
            // Forzamos que apunte a invitacion.html dentro de la carpeta actual
            const urlFinal = urlLimpia.endsWith('/') ? urlLimpia + 'invitacion.html' : urlLimpia + '/invitacion.html';
            
            const linkMagico = `${urlFinal}?n=${encodeURIComponent(nombre)}&p=${pases}`;
            
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('linkFinal').value = linkMagico;
            
            const mensajeWS = `¡Hola ${nombre}! 👋 Aquí tienen su invitación para la boda de Josué y Vilma: ${linkMagico}`;
            document.getElementById('btnWhatsapp').href = `https://wa.me/?text=${encodeURIComponent(mensajeWS)}`;
        }
    </script>
</body>
</html>
