<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Novios - Generador</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 20px; }
        .panel { background: #34495e; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        .resultado { margin-top: 20px; padding: 15px; background: #ecf0f1; color: #333; border-radius: 5px; display: none; }
        #linkFinal { background: #fff; color: #2c3e50; font-weight: bold; border: 1px solid #bdc3c7; }
        #btnWhatsapp { background: #25D366; margin-top: 10px; text-decoration: none; display: block; color: white; padding: 12px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Panel de Novios 👰🤵</h1>
    <div class="panel">
        <p>Crea el link para tu invitado:</p>
        <input type="text" id="nombreI" placeholder="Nombre (ej: Familia Reyes)">
        <input type="number" id="pasesI" placeholder="Número de pases">
        
        <button onclick="generarLink()">Generar Invitación</button>

        <div id="resultado" class="resultado">
            <p>Link listo para enviar:</p>
            <input type="text" id="linkFinal" readonly>
            <a id="btnWhatsapp" target="_blank">Enviar por WhatsApp 📱</a>
        </div>
    </div>

    <script>
        function generarLink() {
            const nombre = document.getElementById('nombreI').value.trim();
            const pases = document.getElementById('pasesI').value.trim();
            
            if (nombre === "" || pases === "") {
                alert("Por favor, completa el nombre y los pases.");
                return;
            }

            // --- LA CONEXIÓN MÁGICA ---
            // 1. Obtenemos la URL actual sin parámetros
            let urlLimpia = window.location.href.split('?')[0];

            // 2. Apuntamos a invitacion.html
            // Si termina en index.html lo reemplaza, si no, lo agrega al final de la ruta
            const urlBase = urlLimpia.includes('index.html') 
                ? urlLimpia.replace('index.html', 'invitacion.html') 
                : urlLimpia.endsWith('/') ? urlLimpia + 'invitacion.html' : urlLimpia + '/invitacion.html';
            
            // 3. Creamos el link final
            const linkMagico = `${urlBase}?n=${encodeURIComponent(nombre)}&p=${pases}`;
            
            // Mostrar resultado en pantalla
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('linkFinal').value = linkMagico;
            
            // Configurar botón de WhatsApp
            const mensajeWS = `¡Hola ${nombre}! 👋 Queremos compartir este momento tan especial con ustedes. Aquí tienen su invitación digital: ${linkMagico}`;
            document.getElementById('btnWhatsapp').href = `https://wa.me/?text=${encodeURIComponent(mensajeWS)}`;
        }
    </script>
</body>
</html>
