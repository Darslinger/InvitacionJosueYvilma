<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Novios - Boda Josué y Vilma</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: white; text-align: center; padding: 20px; }
        .panel { background: #2c3e50; padding: 30px; border-radius: 15px; max-width: 450px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #34495e; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; background: #fdfdfd; color: #333; }
        button { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        .resultado { margin-top: 30px; padding: 20px; background: #ecf0f1; color: #2c3e50; border-radius: 10px; display: none; }
        #linkFinal { background: #fff; color: #27ae60; border: 1px solid #bdc3c7; width: 100%; padding: 10px; box-sizing: border-box; margin-top: 10px; font-weight: bold; }
        #btnWhatsapp { background: #25D366; margin-top: 15px; text-decoration: none; display: block; color: white; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Panel de Novios 👰🤵</h1>
    
    <div class="panel">
        <p style="color: #bdc3c7; margin-bottom: 20px;">Crea el link para tu invitado:</p>
        <input type="text" id="nombreI" placeholder="Nombre (ej: Familia Reyes)">
        <input type="number" id="pasesI" placeholder="Número de pases">
        <button onclick="generarLink()">Generar Invitación ✨</button>

        <div id="resultado" class="resultado">
            <p>Link listo para enviar:</p>
            <input type="text" id="linkFinal" readonly onclick="this.select()">
            <a id="btnWhatsapp" target="_blank">Enviar por WhatsApp 📱</a>
        </div>
    </div>

    <script>
        function generarLink() {
            const nombre = document.getElementById('nombreI').value.trim();
            const pases = document.getElementById('pasesI').value.trim();
            
            if (nombre === "" || pases === "") {
                alert("Por favor, completa todos los campos.");
                return;
            }

            // --- LA CONEXIÓN MÁGICA ---
            // Detectamos la URL actual y nos aseguramos de que apunte a invitacion.html
            let urlActual = window.location.href.split('?')[0];
            let urlDestino = urlActual.replace('index.html', '');
            if (!urlDestino.endsWith('/')) urlDestino += '/';
            
            const linkMagico = `${urlDestino}invitacion.html?n=${encodeURIComponent(nombre)}&p=${pases}`;
            
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('linkFinal').value = linkMagico;
            
            const mensajeWS = `¡Hola ${nombre}! 👋 Queremos compartir este momento tan especial con ustedes. Aquí tienen su invitación digital: ${linkMagico}`;
            document.getElementById('btnWhatsapp').href = `https://wa.me/?text=${encodeURIComponent(mensajeWS)}`;
        }
    </script>
</body>
</html>
