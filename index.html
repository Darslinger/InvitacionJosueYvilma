<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Digital - Vilma & Josue</title>

  <style>
    :root{
      --bg-color:#ffffff;
      --envelope-color:#87CEEB;
      --envelope-dark:#72bcd4;
      --card-bg:#f5f5f5;
      --border-color:#cccccc;
      --text-color:#1a1a1a;
      --serif-font:'Times New Roman', Times, serif;
      --sans-font:'Arial', sans-serif;
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    body{
      background-color:var(--bg-color);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:var(--sans-font);
    }

    .main-container{
      position:relative;
      width:100%;
      max-width:500px;
      display:flex;
      flex-direction:column;
      align-items:center;
      perspective:1500px;
    }

    .header-text{ text-align:center; margin-bottom:30px; }
    .header-text p{
      font-size:13px; letter-spacing:2px; color:#666; margin-bottom:10px;
      font-style:italic; font-family:var(--serif-font);
    }
    .header-text h1{
      font-size:30px; letter-spacing:6px; color:var(--text-color);
      font-weight:400; font-family:var(--serif-font);
    }

    .envelope{
      position:relative;
      width:400px;
      height:270px;
      background-color:var(--envelope-color);
      cursor:pointer;
      box-shadow:0 20px 50px rgba(0,0,0,0.15);
      margin-bottom:40px;
    }

    /* SOLAPA CORREGIDA */
    .flap{
      position:absolute;
      top:0; left:0;
      width:0; height:0;
      border-left:200px solid transparent;
      border-right:200px solid transparent;
      border-top:150px solid var(--envelope-dark);
      transform-origin:top;
      transition:transform .8s ease-in-out, z-index 0.3s;
      z-index:60; /* Cubre el contenido al inicio */
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    /* SELLO VJ CENTRADO */
    .stamp-container{
      position:absolute;
      top:130px;
      left:50%;
      transform:translateX(-50%);
      z-index:70;
      text-align:center;
      transition: opacity .5s ease, transform .8s ease;
    }

    .gold-seal{
      width:65px;
      height:65px;
      background:radial-gradient(circle,#e6b800 0%,#b8860b 70%,#8b6508 100%);
      border-radius:50%;
      box-shadow:inset 0 0 10px rgba(0,0,0,0.3), 0 4px 10px rgba(0,0,0,0.5);
      border:2px solid #d4af37;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gold-seal::after {
      content: 'VJ';
      font-family: var(--serif-font);
      font-weight: bold;
      color: #634a02;
      font-size: 18px;
    }

    .pocket{
      position:absolute;
      bottom:0;
      width:100%;
      height:100%;
      background-color:var(--envelope-color);
      clip-path:polygon(0% 0%, 0% 100%, 100% 100%, 100% 0%, 50% 45%);
      z-index:40; /* El bolsillo siempre abraza las tarjetas */
    }

    /* CONTENIDO QUE SALE HACIA ARRIBA */
    .content-group{
      position:absolute;
      width:100%;
      height:100%;
      top:0; left:0;
      z-index:20; /* Detrás de la solapa inicialmente */
      transition:transform 1s cubic-bezier(0.4,0,0.2,1);
    }

    .plaque{
      background:var(--card-bg);
      border:1px solid var(--border-color);
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      clip-path:polygon(12% 0,88% 0,100% 15%,100% 85%,88% 100%,12% 100%,0 85%,0 15%);
    }

    .card-pase{
      position:absolute;
      width:190px;
      height:145px;
      top:40px;
      left:15px;
      padding:22px 10px;
      z-index:21;
    }

    .card-pase .label{ font-size:10px; letter-spacing:3px; font-weight:bold; margin-bottom:3px; }
    .card-pase .family{ font-family:var(--serif-font); font-size:19px; margin-bottom:5px; color:#111; }
    .card-pase .limit{ font-size:12px; font-weight:bold; border-top:1px solid #ccc; padding-top:8px; color:#b8860b; }

    .card-details{
      position:absolute;
      width:170px;
      height:85px;
      top:160px;
      left:50%;
      transform:translateX(-50%);
      padding:18px 10px;
      z-index:55;
      cursor:pointer;
      text-decoration:none;
      color:inherit;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:4px;
    }

    .card-details:hover{ background:#eee; }

    .polaroid{
      position:absolute;
      width:135px;
      height:155px;
      background:#fff;
      padding:10px 10px 30px 10px;
      top:25px;
      right:15px;
      transform:rotate(12deg);
      box-shadow:5px 10px 20px rgba(0,0,0,0.2);
      z-index:20;
    }

    .polaroid img{ width:100%; height:100%; object-fit:cover; }

    /* ANIMACIÓN DE APERTURA */
    .envelope.open .flap{ transform:rotateX(180deg); z-index:10; }
    .envelope.open .content-group{ transform:translateY(-180px); }
    .envelope.open .stamp-container{ opacity:0; pointer-events:none; transform: translateX(-50%) translateY(-100px); }

    .footer-names h1{
      font-family:var(--serif-font);
      font-size:28px;
      font-weight:400;
      letter-spacing:6px;
      color:var(--text-color);
      text-transform:uppercase;
    }

    @media (max-width:480px){
      .envelope{ width:320px; height:220px; }
      .flap{ border-left-width:160px; border-right-width:160px; border-top-width:120px; }
      .stamp-container{ top: 100px; }
      .card-pase{ width:160px; left:10px; }
      .card-details{ width:140px; top:140px; }
      .polaroid{ width:110px; height:130px; }
    }
  </style>
</head>

<body>
  <div class="main-container">
    <div class="header-text">
      <p>El día más importante de nuestras vidas ha llegado.</p>
      <h1>¡NOS CASAMOS!</h1>
    </div>

    <div class="envelope" id="envelope" onclick="toggleEnvelope()">
      <div class="flap"></div>

      <div class="stamp-container">
        <div class="gold-seal"></div>
      </div>

      <div class="content-group">
        <div class="card-pase plaque">
          <p class="label">PASE</p>
          <p class="family" id="nombreInvitado">Invitado</p>
          <p class="limit"><span id="pasesInvitado">0</span> PERSONAS</p>
        </div>

        <div class="polaroid">
          <img src="assets/image-5.png" alt="Boda">
        </div>

        <a class="card-details plaque" href="#" id="btnDetalles" onclick="goDetalles(event)">
          <p style="font-size:9px; color:#555;">Clic aquí para:</p>
          <p style="font-weight:bold; font-size:12px;">MÁS DETALLES</p>
        </a>
      </div>

      <div class="pocket"></div>
    </div>

    <div class="footer-names">
      <h1>VILMA & JOSUÉ</h1>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const nombre = (urlParams.get('n') || 'Invitado').trim();
    const pases  = (urlParams.get('p') || '0').trim();

    document.getElementById('nombreInvitado').innerText = nombre;
    document.getElementById('pasesInvitado').innerText  = pases;

    function toggleEnvelope(){
      document.getElementById('envelope').classList.toggle('open');
    }

    function goDetalles(e){
      e.preventDefault();
      e.stopPropagation();
      const n = encodeURIComponent(nombre);
      const p = encodeURIComponent(pases);
      window.location.href = `invitacion.html?n=${n}&p=${p}`;
    }
  </script>
</body>
</html>
